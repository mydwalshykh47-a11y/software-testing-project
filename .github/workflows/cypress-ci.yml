# .github/workflows/cypress-ci.yml
# CI/CD Pipeline - GitHub Actions

name: Cypress E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    name: Run Cypress Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # يمكن إضافة browsers أكتر هنا
        browser: [chrome]

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4️⃣ Run Cypress E2E Tests (POM tests)
      - name: Run E2E Tests
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          spec: cypress/e2e/project_tests.cy.js
        env:
          CYPRESS_BASE_URL: https://practicesoftwaretesting.com

      # 5️⃣ Run BDD Cucumber Tests
      - name: Run BDD Cucumber Tests
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          spec: cypress/e2e/features/**/*.feature
        env:
          CYPRESS_BASE_URL: https://practicesoftwaretesting.com

      # 6️⃣ Upload screenshots if tests fail
      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots
          retention-days: 7

      # 7️⃣ Upload test results
      - name: Upload Cypress Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos
          retention-days: 7
